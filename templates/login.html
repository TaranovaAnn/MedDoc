<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Вход — МИС «МедДок»</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="login-wrap">
  <div class="login-box">
    <div class="login-logo">🏥</div>
    <h2>МИС «МедДок»</h2>
    <p>Введите логин и пароль для входа</p>

    {% if error %}
    <div class="alert alert-error" style="margin-bottom:16px">✗ {{ error }}</div>
    {% endif %}

    <form method="post">
      <div class="form-group">
        <label>Логин</label>
        <input name="username" placeholder="admin / doctor1 / reg1 / stat1" autofocus>
      </div>
      <div class="form-group">
        <label>Пароль</label>
        <input name="password" type="password"
               placeholder="admin123 / doc123 / reg123 / stat123">
      </div>
      <button class="btn btn-primary" style="width:100%;justify-content:center">
        Войти →
      </button>
    </form>
  </div>
</div>
</body>
</html>
